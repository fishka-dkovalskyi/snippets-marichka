  <script>

    document.getElementById("commandInput").addEventListener("keypress", function (event) {
      if (event.key === "Enter") {
        let command = this.value.trim();

        if (command === "--bocchi") {
          document.querySelector(".container-heart").style.display = "none";
          document.querySelector(".container-bocchi").style.display = "block";
        }

        if (command === "--heart" || command == "❤") {
          document.querySelector(".container-heart").style.display = "block";
          document.querySelector(".container-bocchi").style.display = "none";
        }

        this.value = ""; // Clear input after pressing Enter
      }
    });


  </script>
