      createCodeBlock(String.raw`
import tkinter as tk
from datetime import datetime

def make_file():
    entry_data_output.delete('0.0', tk.END)

    header = f'C;001;;REWARS;REWARD;P;{datetime.now().strftime("%Y%m%d000000")}\n'
    entry_data_output.insert(tk.END, header)

    data = entry_data_input.get('0.0', tk.END)
    lines = data.split('\n')
    
    for line in lines:
        narah, card = line.split('\t')
        entry_data_output.insert(tk.END, f'{card};CORR;{int(narah) * 100}\n')
    



app = tk.Tk()
app.geometry('400x600')
app.title('Міст Експрес')

# Кнопка запуску зверху
button_generate_file = tk.Button(app, text='Запустити', command=make_file)
button_generate_file.pack(pady=10)

# label_generated_filepath = tk.Label(app, text='Файл з результатом:')
# label_generated_filepath.pack(pady=10)

# Фрейм для вводу та виводу
frame = tk.Frame(app)
frame.pack(fill='both', expand=True, padx=10, pady=10)

# Ліва колонка (ввід)
frame_left = tk.Frame(frame)
frame_left.pack(side='left', fill='both', expand=True, padx=5)

label_input = tk.Label(frame_left, text='Введіть суму та картку:')
label_input.pack()

entry_data_input = tk.Text(frame_left, height=10, width=20)
entry_data_input.pack(fill='both', expand=True)

# Права колонка (вивід)
frame_right = tk.Frame(frame)
frame_right.pack(side='right', fill='both', expand=True, padx=5)

label_output = tk.Label(frame_right, text='Результат:')
label_output.pack()

entry_data_output = tk.Text(frame_right, height=10, width=20)
entry_data_output.pack(fill='both', expand=True)

app.mainloop()



`, document.querySelector('[id="2"]'));
    </script>
